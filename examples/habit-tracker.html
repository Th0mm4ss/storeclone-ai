<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Habit Tracker Pro — Suivi de vos habitudes quotidiennes</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Plus+Jakarta+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root{--bg:#F0FBF5;--white:#FFFFFF;--green:#10B981;--gd:#059669;--gl:#D1FAE5;--coral:#F97316;--cl:#FEE9D7;--text:#111827;--text2:#6B7280;--border:#E5E7EB;--font-d:'Syne',system-ui,sans-serif;--font-b:'Plus Jakarta Sans',system-ui,sans-serif}
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:var(--font-b);background:var(--bg);color:var(--text);min-height:100vh}
    .header{background:var(--white);border-bottom:2px solid var(--border);padding:18px 32px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(0,0,0,.05)}
    .hb{display:flex;align-items:center;gap:14px}
    .hb-emoji{font-size:34px}
    .hb h1{font-family:var(--font-d);font-size:21px;font-weight:800;color:var(--text)}
    .hb p{font-size:11px;color:var(--text2)}
    .ha{display:flex;gap:10px}
    .btn{padding:8px 16px;border:none;border-radius:8px;font-family:var(--font-b);font-size:13px;font-weight:500;cursor:pointer;transition:all .2s}
    .btn-primary{background:var(--green);color:white}.btn-primary:hover{background:var(--gd);transform:translateY(-1px)}
    .btn-outline{background:transparent;border:1.5px solid var(--border);color:var(--text2)}.btn-outline:hover{border-color:var(--green);color:var(--green)}
    .container{max-width:1060px;margin:0 auto;padding:24px 20px}
    @keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
    @keyframes fadeIn{from{opacity:0}to{opacity:1}}
    .perso-bar{background:linear-gradient(135deg,var(--green),var(--gd));border-radius:16px;padding:18px 24px;margin-bottom:24px;display:flex;align-items:center;gap:16px;color:white;box-shadow:0 4px 20px rgba(16,185,129,.25);animation:fadeUp .4s ease;flex-wrap:wrap}
    .pb-field{flex:1;min-width:180px}
    .pb-field label{display:block;font-size:11px;opacity:.8;margin-bottom:4px}
    .pb-field input{width:100%;background:rgba(255,255,255,.2);border:1.5px solid rgba(255,255,255,.3);border-radius:8px;padding:8px 12px;color:white;font-family:var(--font-d);font-size:15px;font-weight:700;outline:none}
    .pb-field input::placeholder{color:rgba(255,255,255,.5)}
    .pb-field input:focus{border-color:white;background:rgba(255,255,255,.28)}
    .stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:24px}
    .sc{background:var(--white);border:1.5px solid var(--border);border-radius:14px;padding:18px;text-align:center;transition:transform .2s,box-shadow .2s;animation:fadeUp .4s ease both}
    .sc:hover{transform:translateY(-3px);box-shadow:0 8px 24px rgba(0,0,0,.08)}
    .sc:nth-child(1){animation-delay:.05s}.sc:nth-child(2){animation-delay:.1s}.sc:nth-child(3){animation-delay:.15s}.sc:nth-child(4){animation-delay:.2s}
    .sc-emoji{font-size:26px;margin-bottom:7px}
    .sc-val{font-family:var(--font-d);font-size:30px;font-weight:800;color:var(--green)}
    .sc-lbl{font-size:11px;color:var(--text2);margin-top:3px}
    .two-col{display:grid;grid-template-columns:1fr 310px;gap:18px;margin-bottom:20px}
    .section{background:var(--white);border:1.5px solid var(--border);border-radius:16px;padding:22px;animation:fadeUp .4s ease both;margin-bottom:18px}
    .section-title{font-family:var(--font-d);font-size:15px;font-weight:700;color:var(--text);margin-bottom:16px;display:flex;align-items:center;gap:8px;justify-content:space-between}
    .habit-item{display:flex;align-items:center;gap:12px;padding:11px 13px;border-radius:10px;margin-bottom:8px;background:var(--bg);border:1.5px solid var(--border);transition:all .2s;animation:fadeIn .25s ease}
    .habit-item:hover{border-color:var(--green);background:var(--gl)}
    .hcheck{width:22px;height:22px;border:2px solid var(--border);border-radius:6px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .2s;flex-shrink:0;font-size:13px;user-select:none}
    .hcheck.done{background:var(--green);border-color:var(--gd);color:white}
    .hinfo{flex:1}
    .hname{font-size:13px;font-weight:500;transition:all .2s}
    .hname.done{text-decoration:line-through;opacity:.55}
    .hstreak{font-size:11px;color:var(--text2);margin-top:2px}
    .hbar{height:4px;background:var(--border);border-radius:2px;margin-top:5px;overflow:hidden}
    .hfill{height:100%;background:var(--green);border-radius:2px;transition:width .5s ease}
    .hdel{background:none;border:none;color:#D1D5DB;cursor:pointer;font-size:15px;padding:2px 6px;border-radius:4px;transition:all .2s}.hdel:hover{color:var(--coral);background:var(--cl)}
    .add-form{display:flex;gap:8px;margin-top:12px}
    .fi{flex:1;padding:9px 12px;border:1.5px solid var(--border);border-radius:8px;font-family:var(--font-b);font-size:13px;color:var(--text);background:var(--white);outline:none;transition:border-color .2s}
    .fi:focus{border-color:var(--green)}
    .wdlabels{display:grid;grid-template-columns:repeat(7,1fr);gap:5px;margin-bottom:4px}
    .wdl{font-size:10px;font-weight:700;text-align:center;color:var(--text2)}
    .wgrid{display:grid;grid-template-columns:repeat(7,1fr);gap:5px;margin-bottom:7px}
    .dcell{height:34px;border-radius:7px;cursor:pointer;transition:all .2s;border:1.5px solid var(--border);background:white}
    .dcell.done{background:var(--green);border-color:var(--gd)}
    .dcell:hover{transform:scale(1.07)}
    .whabel{font-size:12px;color:var(--text2);font-weight:500;margin-bottom:4px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
    .rank-item{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid #F3F4F6}
    .rank-item:last-child{border-bottom:none}
    @media(max-width:900px){.stats-grid{grid-template-columns:repeat(2,1fr)}.two-col{grid-template-columns:1fr}}
    @media(max-width:600px){.container{padding:12px}.header{padding:12px 14px}}
    @media print{.ha{display:none}body{background:white}.section,.sc{box-shadow:none;border:1px solid #ccc}}
  </style>
</head>
<body>
<header class="header">
  <div class="hb"><span class="hb-emoji">🌱</span><div><h1>Habit Tracker Pro</h1><p>Construisez vos habitudes, une journée à la fois</p></div></div>
  <div class="ha">
    <button class="btn btn-outline" onclick="resetData()">🔄 Reset</button>
    <button class="btn btn-outline" onclick="window.print()">🖨️ Imprimer</button>
  </div>
</header>
<div class="container">
  <div class="perso-bar">
    <div class="pb-field"><label>Mon prénom</label><input type="text" id="userName" placeholder="Votre prénom..." maxlength="40" oninput="save()"></div>
    <div class="pb-field" style="flex:2"><label>Mon objectif de transformation</label><input type="text" id="mainGoal" placeholder="Ex : Me lever à 6h30 tous les matins..." maxlength="100" onblur="save()"></div>
  </div>
  <div class="stats-grid">
    <div class="sc"><div class="sc-emoji">✅</div><div class="sc-val" id="sDone">0</div><div class="sc-lbl">Habitudes aujourd'hui</div></div>
    <div class="sc"><div class="sc-emoji">🔥</div><div class="sc-val" id="sStreak">0</div><div class="sc-lbl">Série record</div></div>
    <div class="sc"><div class="sc-emoji">📊</div><div class="sc-val" id="sRate">0%</div><div class="sc-lbl">Taux de réussite 7j</div></div>
    <div class="sc"><div class="sc-emoji">⭐</div><div class="sc-val" id="sTotal">0</div><div class="sc-lbl">Habitudes actives</div></div>
  </div>
  <div class="two-col">
    <div>
      <div class="section">
        <div class="section-title"><span>📋 Mes habitudes — <span id="todayDate" style="font-weight:400;font-size:13px;color:var(--text2)"></span></span></div>
        <div id="habitsList"></div>
        <div class="add-form">
          <input class="fi" type="text" id="newHabit" placeholder="Nouvelle habitude (ex : Méditer 10 min)" maxlength="60" onkeydown="if(event.key==='Enter')addHabit()">
          <button class="btn btn-primary" onclick="addHabit()">+ Ajouter</button>
        </div>
      </div>
      <div class="section">
        <div class="section-title"><span>📅 Suivi de la semaine</span></div>
        <div class="wdlabels"><div class="wdl">Lun</div><div class="wdl">Mar</div><div class="wdl">Mer</div><div class="wdl">Jeu</div><div class="wdl">Ven</div><div class="wdl">Sam</div><div class="wdl">Dim</div></div>
        <div id="weeklyGrid"></div>
      </div>
    </div>
    <div>
      <div class="section" style="margin-bottom:16px">
        <div class="section-title"><span>📈 Progression 7 jours</span></div>
        <canvas id="barChart" width="268" height="150"></canvas>
      </div>
      <div class="section">
        <div class="section-title"><span>🏆 Classement</span></div>
        <div id="ranking"></div>
      </div>
    </div>
  </div>
</div>
<script>
const KEY='sc_habit_tracker_pro';
const DAYS=['Lun','Mar','Mer','Jeu','Ven','Sam','Dim'];
let data={userName:'',mainGoal:'',habits:[],history:{}};
function p2(n){return String(n).padStart(2,'0');}
function dateKey(d){return `${d.getFullYear()}-${p2(d.getMonth()+1)}-${p2(d.getDate())}`;}
function todayKey(){return dateKey(new Date());}
function getWeekDays(){const days=[],today=new Date();for(let i=6;i>=0;i--){const d=new Date(today);d.setDate(today.getDate()-i);days.push(dateKey(d));}return days;}
function addHabit(){const name=document.getElementById('newHabit').value.trim();if(!name)return;data.habits.push({id:Date.now(),name});document.getElementById('newHabit').value='';save();render();}
function toggleHabit(id){const today=todayKey();if(!data.history[today])data.history[today]={};data.history[today][id]=!data.history[today][id];save();render();}
function deleteHabit(id){data.habits=data.habits.filter(h=>h.id!==id);save();render();}
function toggleCell(date,id){if(!data.history[date])data.history[date]={};data.history[date][id]=!data.history[date][id];save();render();}
function calcStreak(id){let s=0;const today=new Date();for(let i=0;i<365;i++){const d=new Date(today);d.setDate(today.getDate()-i);const k=dateKey(d);if(data.history[k]?.[id])s++;else if(i>0)break;}return s;}
function calcWeekRate(id){const days=getWeekDays();return Math.round(days.filter(d=>data.history[d]?.[id]).length/7*100);}
function render(){renderHabits();renderWeekly();renderBar();renderRanking();updateStats();}
function renderHabits(){
  const today=todayKey();const td=data.history[today]||{};const el=document.getElementById('habitsList');
  if(!data.habits.length){el.innerHTML='<p style="color:var(--text2);font-size:13px;padding:8px 0">Ajoutez vos premières habitudes ci-dessous.</p>';return;}
  el.innerHTML=data.habits.map(h=>{
    const done=!!td[h.id];const str=calcStreak(h.id);const wr=calcWeekRate(h.id);
    return `<div class="habit-item"><div class="hcheck${done?' done':''}" onclick="toggleHabit(${h.id})">${done?'✓':''}</div><div class="hinfo"><div class="hname${done?' done':''}">${h.name}</div><div class="hstreak">🔥 ${str} jours · ${wr}% cette semaine</div><div class="hbar"><div class="hfill" style="width:${wr}%"></div></div></div><button class="hdel" onclick="deleteHabit(${h.id})">✕</button></div>`;
  }).join('');
}
function renderWeekly(){
  const wdays=getWeekDays();const el=document.getElementById('weeklyGrid');
  if(!data.habits.length){el.innerHTML='';return;}
  el.innerHTML=data.habits.slice(0,5).map(h=>{
    const cells=wdays.map(d=>`<div class="dcell${data.history[d]?.[h.id]?' done':''}" onclick="toggleCell('${d}',${h.id})"></div>`).join('');
    return `<div class="whabel">${h.name.slice(0,24)}</div><div class="wgrid">${cells}</div>`;
  }).join('');
}
function renderBar(){
  const canvas=document.getElementById('barChart');if(!canvas)return;
  const ctx=canvas.getContext('2d');ctx.clearRect(0,0,268,150);
  const wdays=getWeekDays();
  const rates=wdays.map(d=>data.habits.length?Math.round(data.habits.filter(h=>data.history[d]?.[h.id]).length/data.habits.length*100):0);
  const maxH=100,bw=26,gap=10,sx=12;
  rates.forEach((rate,i)=>{
    const x=sx+i*(bw+gap);const bh=rate/100*maxH;const y=maxH+12-bh;
    const g=ctx.createLinearGradient(0,y,0,y+bh);g.addColorStop(0,'#10B981');g.addColorStop(1,'#059669');
    ctx.fillStyle=bh?g:'#E5E7EB';ctx.beginPath();
    if(ctx.roundRect)ctx.roundRect(x,y,bw,Math.max(bh,3),4);else ctx.rect(x,y,bw,Math.max(bh,3));ctx.fill();
    ctx.fillStyle='#6B7280';ctx.font='9px Plus Jakarta Sans,sans-serif';ctx.textAlign='center';ctx.fillText(DAYS[i],x+bw/2,maxH+26);
    if(rate>0){ctx.fillStyle='#111827';ctx.fillText(rate+'%',x+bw/2,y-3);}
  });
}
function renderRanking(){
  const el=document.getElementById('ranking');if(!data.habits.length){el.innerHTML='<p style="font-size:13px;color:var(--text2)">Aucune habitude définie.</p>';return;}
  const medals=['🥇','🥈','🥉'];
  const sorted=[...data.habits].map(h=>({...h,rate:calcWeekRate(h.id),streak:calcStreak(h.id)})).sort((a,b)=>b.rate-a.rate);
  el.innerHTML=sorted.slice(0,5).map((h,i)=>`<div class="rank-item"><span style="font-size:16px">${medals[i]||'🏅'}</span><div style="flex:1"><div style="font-size:13px;font-weight:500">${h.name.slice(0,28)}</div><div style="font-size:11px;color:var(--text2)">🔥 ${h.streak} jours</div></div><span style="font-size:13px;font-weight:600;color:var(--green)">${h.rate}%</span></div>`).join('');
}
function updateStats(){
  const today=todayKey();const done=data.habits.filter(h=>data.history[today]?.[h.id]).length;
  const maxStr=data.habits.reduce((m,h)=>Math.max(m,calcStreak(h.id)),0);
  const avgRate=data.habits.length?Math.round(data.habits.reduce((s,h)=>s+calcWeekRate(h.id),0)/data.habits.length):0;
  animNum('sDone',done);animNum('sStreak',maxStr);document.getElementById('sRate').textContent=avgRate+'%';animNum('sTotal',data.habits.length);
}
function animNum(id,target){const el=document.getElementById(id);if(!el)return;let c=0;const s=Math.ceil(target/18)||1;const t=setInterval(()=>{c=Math.min(c+s,target);el.textContent=c;if(c>=target)clearInterval(t);},25);}
function save(){data.userName=document.getElementById('userName')?.value||'';data.mainGoal=document.getElementById('mainGoal')?.value||'';try{localStorage.setItem(KEY,JSON.stringify(data));}catch(e){}}
function load(){try{const d=JSON.parse(localStorage.getItem(KEY)||'null');if(!d)return;data={...data,...d};if(data.userName&&document.getElementById('userName'))document.getElementById('userName').value=data.userName;if(data.mainGoal&&document.getElementById('mainGoal'))document.getElementById('mainGoal').value=data.mainGoal;}catch(e){}}
function resetData(){if(!confirm('Réinitialiser toutes les données ?'))return;data={userName:'',mainGoal:'',habits:[],history:{}};document.getElementById('userName').value='';document.getElementById('mainGoal').value='';initDefaults();save();render();}
function initDefaults(){
  if(data.habits.length)return;
  const defaults=["Méditer 10 minutes","Boire 2L d'eau","30 min de sport","Lire 20 pages","Pas de réseaux avant 9h","Journaling du soir","Se coucher avant 23h"];
  const today=new Date();
  defaults.forEach((name,i)=>{
    const id=1000+i;data.habits.push({id,name});
    for(let j=0;j<7;j++){const d=new Date(today);d.setDate(today.getDate()-j);const k=dateKey(d);if(!data.history[k])data.history[k]={};if(Math.random()>.3)data.history[k][id]=true;}
  });
}
document.addEventListener('DOMContentLoaded',()=>{
  const now=new Date();const opts={weekday:'long',year:'numeric',month:'long',day:'numeric'};
  document.getElementById('todayDate').textContent=now.toLocaleDateString('fr-FR',opts);
  load();initDefaults();render();
});
</script>
</body>
</html>
