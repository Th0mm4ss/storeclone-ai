<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Page introuvable — StoreClone AI</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect fill='%23000' rx='20' width='100' height='100'/><text x='50' y='68' text-anchor='middle' fill='white' font-size='45' font-family='Arial' font-weight='bold'>SC</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{--white:#fff;--off:#f5f5f7;--black:#000;--dark:#1d1d1f;--gray:#6e6e73;--border:rgba(0,0,0,0.08);}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Inter',-apple-system,sans-serif;background:var(--white);color:var(--dark);min-height:100vh;display:flex;align-items:center;justify-content:center;-webkit-font-smoothing:antialiased;position:relative;overflow:hidden;}
body::before{content:'';position:absolute;inset:0;background-image:linear-gradient(rgba(0,0,0,0.04) 1px,transparent 1px),linear-gradient(90deg,rgba(0,0,0,0.04) 1px,transparent 1px);background-size:48px 48px;pointer-events:none;}
.container{text-align:center;padding:40px 24px;position:relative;z-index:1;max-width:480px;}
.code{font-size:120px;font-weight:600;letter-spacing:-6px;color:var(--dark);line-height:1;margin-bottom:24px;opacity:0.08;}
.title{font-size:28px;font-weight:600;letter-spacing:-0.8px;margin-bottom:12px;}
.sub{font-size:15px;color:var(--gray);font-weight:300;line-height:1.6;margin-bottom:36px;}
.btn{display:inline-flex;align-items:center;gap:8px;padding:13px 28px;background:var(--black);color:var(--white);border:none;border-radius:980px;font-size:14px;font-weight:500;cursor:pointer;font-family:'Inter',sans-serif;text-decoration:none;transition:background 0.2s;}
.btn:hover{background:#222;}
.logo{font-size:15px;font-weight:600;letter-spacing:-0.3px;color:var(--dark);margin-bottom:48px;display:block;}
.logo span{font-weight:300;}
</style>
</head>
<body>
<div class="container">
  <a href="/" class="logo">StoreClone <span>AI</span></a>
  <div class="code">404</div>
  <div class="title">Page introuvable</div>
  <p class="sub">La page que vous cherchez n'existe pas ou a été déplacée.</p>
  <a href="/" class="btn">← Retour à l'accueil</a>
</div>
</body>
</html>
