<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Page introuvable — StoreClone AI</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect fill='%23000' rx='20' width='100' height='100'/><text x='50' y='68' text-anchor='middle' fill='white' font-size='45' font-family='Arial' font-weight='bold'>SC</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<link href="https://api.fontshare.com/v2/css?f[]=satoshi@700,500&display=swap" rel="stylesheet">
<style>
:root{--white:#fff;--off:#f5f5f7;--black:#000;--dark:#1d1d1f;--gray:#6e6e73;--border:rgba(0,0,0,0.08);}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Inter',-apple-system,sans-serif;background:var(--white);color:var(--dark);min-height:100vh;display:flex;flex-direction:column;-webkit-font-smoothing:antialiased;}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(0,0,0,0.04) 1px,transparent 1px),linear-gradient(90deg,rgba(0,0,0,0.04) 1px,transparent 1px);background-size:48px 48px;pointer-events:none;z-index:0;}
.nav{position:fixed;top:0;left:0;right:0;height:56px;background:rgba(255,255,255,0.92);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 40px;z-index:10;}
.nav-logo{font-size:16px;font-weight:600;letter-spacing:-0.3px;color:var(--dark);text-decoration:none;}
.nav-logo span{font-weight:300;}
.main{flex:1;display:flex;align-items:center;justify-content:center;padding:80px 24px 40px;position:relative;z-index:1;}
.container{text-align:center;max-width:480px;}
.code{font-family:'Satoshi','Inter',sans-serif;font-size:8rem;font-weight:700;color:var(--black);line-height:1;margin-bottom:20px;letter-spacing:-4px;}
h1{font-size:26px;font-weight:600;letter-spacing:-0.8px;margin-bottom:10px;}
.sub{font-size:15px;color:var(--gray);font-weight:300;line-height:1.6;margin-bottom:36px;}
.btns{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;}
.btn-primary{display:inline-flex;align-items:center;gap:8px;padding:13px 28px;background:var(--black);color:var(--white);border:none;border-radius:10px;font-size:14px;font-weight:500;cursor:pointer;font-family:'Inter',sans-serif;text-decoration:none;transition:background 0.2s;}
.btn-primary:hover{background:#222;}
.btn-outline{display:inline-flex;align-items:center;gap:8px;padding:12px 28px;background:transparent;color:var(--dark);border:1.5px solid var(--dark);border-radius:10px;font-size:14px;font-weight:500;cursor:pointer;font-family:'Inter',sans-serif;text-decoration:none;transition:all 0.2s;}
.btn-outline:hover{background:var(--off);}
footer{text-align:center;padding:24px;font-size:12px;color:var(--gray);border-top:1px solid var(--border);position:relative;z-index:1;}
</style>
</head>
<body>

<nav class="nav">
  <a href="/" class="nav-logo">StoreClone<span>AI</span></a>
</nav>

<main class="main">
  <div class="container">
    <div class="code">404</div>
    <h1>Cette page n'existe pas</h1>
    <p class="sub">Vous avez suivi un lien cassé ou tapé une mauvaise URL.</p>
    <div class="btns">
      <a href="/" class="btn-primary">← Retour à l'accueil</a>
      <a href="/app.html" class="btn-outline">Ouvrir l'app</a>
    </div>
  </div>
</main>

<footer>
  &copy; 2026 StoreClone AI — Tous droits réservés
</footer>

</body>
</html>
